<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>myPalletizer 260</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f7f6f3; --white: #fff; --border: #e0ddd8; --border-mid: #ccc9c2;
  --text: #1a1a1a; --muted: #999; --accent: #1a6b3c; --danger: #c0392b;
  --mono: 'IBM Plex Mono', 'Courier New', monospace;
}
html, body {
  min-height: 100%; background: var(--bg); color: var(--text);
  font-family: var(--mono); font-size: 13px; -webkit-font-smoothing: antialiased;
}

/* two-column layout */
.shell {
  max-width: 1100px;
  margin: 0 auto;
  padding: 40px 24px 80px;
}
header {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 32px;
}
.title { font-size: 15px; font-weight: 500; }
.title span { color: var(--accent); }
.status { display: flex; align-items: center; gap: 7px; font-size: 11px; color: var(--muted); }
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border-mid); transition: background .3s; }
.dot.live { background: var(--accent); }

.columns {
  display: grid;
  grid-template-columns: 1fr 340px;
  gap: 32px;
  align-items: start;
}

/* left column sections */
.section { margin-bottom: 28px; }
.label {
  font-size: 10px; letter-spacing: .14em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 12px;
}
.row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
hr { border: none; border-top: 1px solid var(--border); margin: 22px 0; }

/* inputs */
select, input[type="text"], input[type="number"] {
  height: 34px; border: 1px solid var(--border); border-radius: 3px;
  background: var(--white); color: var(--text); font-family: var(--mono);
  font-size: 12px; padding: 0 10px; outline: none; transition: border-color .15s;
  -webkit-appearance: none;
}
select:focus, input:focus { border-color: var(--accent); }
select {
  cursor: pointer; padding-right: 26px;
  background-image: url("data:image/svg+xml,%3Csvg width='9' height='5' viewBox='0 0 9 5' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l3.5 3L8 1' stroke='%23999' stroke-width='1.2' fill='none'/%3E%3C/svg%3E");
  background-repeat: no-repeat; background-position: right 9px center; background-color: var(--white);
}

/* buttons */
button {
  height: 34px; padding: 0 14px; border: 1px solid var(--border); border-radius: 3px;
  background: var(--white); color: var(--text); font-family: var(--mono); font-size: 12px;
  cursor: pointer; white-space: nowrap; transition: border-color .15s, background .15s;
}
button:hover { border-color: var(--border-mid); background: var(--bg); }
button:active { transform: scale(0.98); }
button:disabled { opacity: .3; cursor: not-allowed; transform: none; }
button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
button.primary:hover { background: #155732; border-color: #155732; }
button.ghost { background: transparent; border-color: transparent; color: var(--muted); padding: 0 8px; }
button.ghost:hover { color: var(--text); }

/* joints */
.joints { display: flex; flex-direction: column; gap: 14px; }
.joint { display: grid; grid-template-columns: 100px 1fr 76px; gap: 12px; align-items: center; }
.jlabel { display: flex; flex-direction: column; gap: 2px; }
.jname { font-size: 12px; font-weight: 500; }
.jrange { font-size: 10px; color: var(--muted); }

input[type="range"] {
  -webkit-appearance: none; appearance: none; height: 1px;
  background: var(--border-mid); border: none; padding: 0; outline: none;
  cursor: pointer; width: 100%;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
  background: var(--white); border: 1.5px solid var(--accent); cursor: pointer; transition: transform .1s;
}
input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.15); }
input[type="range"]::-moz-range-thumb {
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--white); border: 1.5px solid var(--accent);
}
.jval { display: flex; align-items: center; gap: 4px; }
.jval input[type="number"] { width: 60px; text-align: right; padding: 0 6px; height: 30px; }
.jdeg { font-size: 11px; color: var(--muted); }

/* speed */
.speed-row { display: grid; grid-template-columns: 1fr 36px; gap: 12px; align-items: center; }
.speed-num { font-size: 12px; text-align: right; color: var(--text); }

/* saved locations */
.saved-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; min-height: 28px; }
.saved-item {
  display: flex; align-items: center; gap: 8px; padding: 9px 12px;
  background: var(--white); border: 1px solid var(--border); border-radius: 3px;
}
.saved-item:hover { border-color: var(--border-mid); }
.saved-name { flex: 0 0 auto; font-size: 12px; min-width: 80px; }
.saved-angles { flex: 1; font-size: 11px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.save-row { display: flex; gap: 8px; }
.save-row input[type="text"] { flex: 1; }
.empty { font-size: 12px; color: var(--muted); padding: 4px 0; }

/* terminal (right column) */
.term-col {
  position: sticky;
  top: 24px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.term-header {
  display: flex; align-items: center; justify-content: space-between;
}
.term {
  background: var(--white); border: 1px solid var(--border); border-radius: 3px;
  padding: 10px 12px; height: calc(100vh - 160px); min-height: 400px;
  overflow-y: auto; display: flex; flex-direction: column; gap: 1px;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}
.term::-webkit-scrollbar { width: 4px; }
.term::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.term-line { display: flex; gap: 8px; font-size: 11px; line-height: 1.8; }
.term-time { color: var(--muted); flex-shrink: 0; }
.tx   .term-text { color: var(--accent); }
.rx   .term-text { color: var(--text); }
.err  .term-text { color: var(--danger); }
.info .term-text { color: #1a6b3c; font-style: italic; }
.sys  .term-text { color: var(--muted); }

@media (max-width: 720px) {
  .columns { grid-template-columns: 1fr; }
  .term { height: 220px; min-height: unset; }
  .term-col { position: static; }
}
</style>
</head>
<body>
<div class="shell">

  <header>
    <div class="title">myPalletizer <span>260</span> <span style="font-size:10px;font-weight:400;color:var(--muted);margin-left:8px">v1.11</span></div>
    <div class="status"><div class="dot" id="dot"></div><span id="connLabel">disconnected</span></div>
  </header>

  <div class="columns">

    <!-- ── LEFT COLUMN ── -->
    <div class="left">

      <!-- connection -->
      <div class="section">
        <div class="label">Connection</div>
        <div class="row">
          <select id="baudSelect">
            <option value="115200" selected>115200 baud</option>
            <option value="1000000">1000000 baud (Pi)</option>
          </select>
          <button class="primary" id="connectBtn" onclick="doConnect()">Connect</button>
          <button id="disconnectBtn" onclick="doDisconnect()" disabled>Disconnect</button>
          <button id="pingBtn" onclick="doPing()" disabled>Ping</button>
        </div>
      </div>

      <hr>

      <!-- joints -->
      <div class="section">
        <div class="label">Joints</div>
        <div class="joints" id="jointGrid"></div>

        <div style="margin-top:16px">
          <div class="label" style="margin-bottom:10px">Speed</div>
          <div class="speed-row">
            <input type="range" id="speedSlider" min="1" max="100" value="30"
              oninput="document.getElementById('speedNum').textContent=this.value">
            <div class="speed-num" id="speedNum">30</div>
          </div>
        </div>

        <div class="row" style="margin-top:16px">
          <button class="primary" id="sendBtn" onclick="doSend()" disabled>Send</button>
          <button id="homeBtn" onclick="doHome()" disabled>Home</button>
          <button id="readBtn" onclick="doGetAngles()" disabled>Read angles</button>
          <button id="motorsOnBtn" onclick="doPowerOn()" disabled>Motors on</button>
          <button id="motorsOffBtn" onclick="doRelease()" disabled>Motors off</button>
        </div>
      </div>

      <hr>

      <!-- saved locations -->
      <div class="section">
        <div class="label">Saved locations</div>
        <div class="saved-list" id="savedList"></div>
        <div class="save-row">
          <input type="text" id="saveName" placeholder="location name"
            onkeydown="if(event.key==='Enter')doSave()">
          <button onclick="doSave()">Save current</button>
        </div>
      </div>

    </div>

    <!-- ── RIGHT COLUMN: terminal ── -->
    <div class="term-col">
      <div class="term-header">
        <span class="label" style="margin-bottom:0">Terminal</span>
        <button class="ghost" onclick="clearLog()">Clear</button>
      </div>
      <div class="term" id="terminal"></div>
    </div>

  </div>
</div>

<script>
// ─────────────────────────────────────────
// Joint definitions
// ─────────────────────────────────────────
var JOINTS = [
  { name: 'J1', min: -150, max:  50,  home: -38.9 },
  { name: 'J2', min:  -90, max:  90,  home: -57.6 },
  { name: 'J3', min:  -90, max:  90,  home:  53.3 },
  { name: 'J4', min: -120, max:  55,  home: -35.3 },
];

// ─────────────────────────────────────────
// Protocol  [0xFE 0xFE len cmd data... 0xFA]
// ─────────────────────────────────────────
var HDR = 0xFE, TAIL = 0xFA;
var CMD = {
  POWER_ON:     0x10,
  RELEASE:        0x13,
  GET_ANGLES:     0x20,
  SEND_ANGLES:    0x22,
  SET_FRESH_MODE: 0x2c,
  PING:           0x12,
};

function mkFrame(cmd, data) {
  var out = [HDR, HDR, data.length + 2, cmd];
  for (var i = 0; i < data.length; i++) out.push(data[i] & 0xFF);
  out.push(TAIL);
  return new Uint8Array(out);
}

function degToBytes(deg) {
  var v = Math.round(parseFloat(deg) * 100);
  if (v < 0) v = v + 65536;
  return [(v >> 8) & 0xFF, v & 0xFF];
}

function bytesToDeg(hi, lo) {
  var v = (hi << 8) | lo;
  if (v > 32767) v = v - 65536;
  return (v / 100).toFixed(1);
}

function mkSendAngles(angles, speed) {
  var data = [];
  for (var i = 0; i < 4; i++) {
    var b = degToBytes(angles[i]);
    data.push(b[0]);
    data.push(b[1]);
  }
  data.push(Math.min(100, Math.max(1, Math.round(Number(speed)))));
  return mkFrame(CMD.SEND_ANGLES, data);
}

// send set_fresh_mode(0) then the angles frame with a small gap
async function txAngles(angles, speed) {
  await tx(mkFrame(CMD.SET_FRESH_MODE, [0]));
  await new Promise(function(r){ setTimeout(r, 50); });
  await tx(mkSendAngles(angles, speed));
}

// ─────────────────────────────────────────
// Serial
// ─────────────────────────────────────────
var port = null, writer = null, reader = null, rxBuf = [];

async function doConnect() {
  if (!navigator.serial) { log('Web Serial not available — use Chrome or Edge 89+', 'err'); return; }
  try {
    port = await navigator.serial.requestPort();
    var baud = parseInt(document.getElementById('baudSelect').value);
    await port.open({ baudRate: baud });
    writer = port.writable.getWriter();
    reader = port.readable.getReader();
    setConn(true);
    log('connected at ' + baud + ' baud', 'sys');
    readLoop();
  } catch(e) {
    if (e.name !== 'NotFoundError') log('connect error: ' + e.message, 'err');
  }
}

async function doDisconnect() {
  try {
    if (reader) { await reader.cancel(); reader.releaseLock(); reader = null; }
    if (writer) { writer.releaseLock(); writer = null; }
    if (port)   { await port.close(); port = null; }
  } catch(e) { log('disconnect: ' + e.message, 'err'); }
  rxBuf = [];
  setConn(false);
  log('disconnected', 'sys');
}

async function readLoop() {
  while (reader) {
    try {
      var r = await reader.read();
      if (r.done) break;
      for (var i = 0; i < r.value.length; i++) rxBuf.push(r.value[i]);
      drainBuf();
    } catch(e) {
      if (reader) log('read error: ' + e.message, 'err');
      break;
    }
  }
}

function drainBuf() {
  while (rxBuf.length >= 4) {
    if (rxBuf[0] !== HDR || rxBuf[1] !== HDR) { rxBuf.shift(); continue; }
    var len = rxBuf[2];
    var need = 3 + len;
    if (rxBuf.length < need) break;
    var frame = rxBuf.splice(0, need);
    onFrame(frame);
  }
}

function onFrame(frame) {
  var hex = frame.map(function(b){ return b.toString(16).padStart(2,'0').toUpperCase(); }).join(' ');
  log('rx  ' + hex, 'rx');

  var cmd  = frame[3];
  var data = frame.slice(4, frame.length - 1);

  if (cmd === CMD.PING) {
    log('→ ping: ' + (data[0] === 1 ? 'controller connected ✓' : 'not connected'), 'info');
  } else if (cmd === CMD.GET_ANGLES && data.length >= 8) {
    var a = [];
    for (var i = 0; i < 4; i++) a.push(bytesToDeg(data[i*2], data[i*2+1]));
    log('→ angles: J1=' + a[0] + '° J2=' + a[1] + '° J3=' + a[2] + '° J4=' + a[3] + '°', 'info');
    a.forEach(function(val, i) {
      var clamped = Math.max(JOINTS[i].min, Math.min(JOINTS[i].max, parseFloat(val)));
      document.getElementById('js' + i).value = clamped;
      document.getElementById('jn' + i).value = val;
    });
  } else if (cmd === CMD.POWER_ON) {
    log('→ motors on acknowledged', 'info');
  } else if (cmd === CMD.SEND_ANGLES) {
    log('→ move acknowledged', 'info');
  }
}

async function tx(bytes) {
  if (!writer) { log('not connected', 'err'); return; }
  var hex = Array.from(bytes).map(function(b){ return b.toString(16).padStart(2,'0').toUpperCase(); }).join(' ');
  log('tx  ' + hex, 'tx');
  try { await writer.write(bytes); }
  catch(e) { log('send error: ' + e.message, 'err'); }
}

// ─────────────────────────────────────────
// Commands
// ─────────────────────────────────────────
function doPing()      { tx(mkFrame(CMD.PING, [])); }
function doGetAngles() { tx(mkFrame(CMD.GET_ANGLES, [])); }
function doPowerOn()   { tx(mkFrame(CMD.POWER_ON, [])); }
function doRelease()   { tx(mkFrame(CMD.RELEASE, [])); }

function doSend() {
  var spd = parseInt(document.getElementById('speedSlider').value);
  var angles = JOINTS.map(function(_, i) { return parseFloat(document.getElementById('jn' + i).value) || 0; });
  log('sending: J1=' + angles[0] + '° J2=' + angles[1] + '° J3=' + angles[2] + '° J4=' + angles[3] + '°', 'sys');
  txAngles(angles, spd);
}

function doHome() {
  var angles = JOINTS.map(function(j) { return j.home; });
  JOINTS.forEach(function(j, i) {
    document.getElementById('js' + i).value = Math.max(j.min, Math.min(j.max, j.home));
    document.getElementById('jn' + i).value = j.home;
  });
  log('homing: J1=' + angles[0] + '° J2=' + angles[1] + '° J3=' + angles[2] + '° J4=' + angles[3] + '°', 'sys');
  txAngles(angles, 30);
}

// ─────────────────────────────────────────
// Joint UI
// ─────────────────────────────────────────
(function buildJoints() {
  var grid = document.getElementById('jointGrid');
  JOINTS.forEach(function(j, i) {
    var row = document.createElement('div');
    row.className = 'joint';

    var lbl = document.createElement('div');
    lbl.className = 'jlabel';
    lbl.innerHTML = '<span class="jname">' + j.name + '</span><span class="jrange">' + j.min + '° to ' + j.max + '°</span>';

    var sl = document.createElement('input');
    sl.type = 'range'; sl.id = 'js' + i;
    sl.min = j.min; sl.max = j.max; sl.step = '0.5';
    sl.value = Math.max(j.min, Math.min(j.max, j.home));

    var wrap = document.createElement('div');
    wrap.className = 'jval';
    var nm = document.createElement('input');
    nm.type = 'number'; nm.id = 'jn' + i;
    nm.min = j.min; nm.max = j.max; nm.step = '0.5';
    nm.value = j.home;
    var deg = document.createElement('span');
    deg.className = 'jdeg'; deg.textContent = '°';
    wrap.appendChild(nm); wrap.appendChild(deg);

    row.appendChild(lbl); row.appendChild(sl); row.appendChild(wrap);
    grid.appendChild(row);

    // keep slider and number in sync
    sl.addEventListener('input', function() { nm.value = parseFloat(sl.value).toFixed(1); });
    nm.addEventListener('input', function() {
      sl.value = Math.max(j.min, Math.min(j.max, parseFloat(nm.value) || 0));
    });
  });
})();

// ─────────────────────────────────────────
// Saved locations
// ─────────────────────────────────────────
var STORE = 'mp260_v3';
var saved = [];
try { saved = JSON.parse(localStorage.getItem(STORE) || '[]'); } catch(_) { saved = []; }

function persist() { localStorage.setItem(STORE, JSON.stringify(saved)); }

function renderSaved() {
  var list = document.getElementById('savedList');
  list.innerHTML = '';
  if (!saved.length) {
    var emp = document.createElement('div');
    emp.className = 'empty'; emp.textContent = 'No saved locations yet.';
    list.appendChild(emp);
    return;
  }
  saved.forEach(function(loc, i) {
    var item = document.createElement('div');
    item.className = 'saved-item';

    var nm = document.createElement('span');
    nm.className = 'saved-name'; nm.textContent = loc.name;

    var ang = document.createElement('span');
    ang.className = 'saved-angles';
    ang.textContent = loc.angles.map(function(a, k) {
      return JOINTS[k].name + '=' + parseFloat(a).toFixed(1) + '°';
    }).join('  ');

    var goBtn = document.createElement('button');
    goBtn.textContent = 'Go';
    goBtn.addEventListener('click', function() { recall(i); });

    var delBtn = document.createElement('button');
    delBtn.className = 'ghost'; delBtn.textContent = '✕'; delBtn.title = 'Delete';
    delBtn.addEventListener('click', function() {
      saved.splice(i, 1); persist(); renderSaved();
      log('deleted "' + loc.name + '"', 'sys');
    });

    item.appendChild(nm); item.appendChild(ang); item.appendChild(goBtn); item.appendChild(delBtn);
    list.appendChild(item);
  });
}

function doSave() {
  var el   = document.getElementById('saveName');
  var name = el.value.trim() || ('location ' + (saved.length + 1));
  var angles = JOINTS.map(function(_, i) { return parseFloat(document.getElementById('jn' + i).value) || 0; });
  var speed  = parseInt(document.getElementById('speedSlider').value);
  saved.push({ name: name, angles: angles, speed: speed });
  persist(); el.value = ''; renderSaved();
  log('saved "' + name + '"', 'sys');
}

function recall(i) {
  var loc = saved[i];
  if (!loc) { log('location ' + i + ' not found', 'err'); return; }
  JOINTS.forEach(function(j, k) {
    document.getElementById('js' + k).value = Math.max(j.min, Math.min(j.max, loc.angles[k]));
    document.getElementById('jn' + k).value = parseFloat(loc.angles[k]).toFixed(1);
  });
  document.getElementById('speedSlider').value = loc.speed;
  document.getElementById('speedNum').textContent = loc.speed;
  log('recalling "' + loc.name + '"', 'sys');
  txAngles(loc.angles, loc.speed);
}

renderSaved();

// ─────────────────────────────────────────
// UI state
// ─────────────────────────────────────────
function setConn(c) {
  document.getElementById('dot').className          = 'dot' + (c ? ' live' : '');
  document.getElementById('connLabel').textContent  = c ? 'connected' : 'disconnected';
  document.getElementById('connectBtn').disabled    = c;
  document.getElementById('disconnectBtn').disabled = !c;
  ['pingBtn','sendBtn','homeBtn','readBtn','motorsOnBtn','motorsOffBtn'].forEach(function(id) {
    document.getElementById(id).disabled = !c;
  });
}

function log(msg, type) {
  type = type || 'sys';
  var term = document.getElementById('terminal');
  var line = document.createElement('div');
  line.className = 'term-line ' + type;
  var ts = document.createElement('span'); ts.className = 'term-time';
  ts.textContent = new Date().toTimeString().slice(0,8);
  var ms = document.createElement('span'); ms.className = 'term-text';
  ms.textContent = msg;
  line.appendChild(ts); line.appendChild(ms);
  term.appendChild(line);
  term.scrollTop = term.scrollHeight;
}

function clearLog() { document.getElementById('terminal').innerHTML = ''; }
</script>
</body>
</html>
