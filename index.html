<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>myPalletizer 260 v1.14</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f7f6f3; --white: #fff; --border: #e0ddd8; --border-mid: #ccc9c2;
  --text: #1a1a1a; --muted: #999; --accent: #1a6b3c; --danger: #c0392b;
  --mono: 'IBM Plex Mono', 'Courier New', monospace;
}
html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 13px; -webkit-font-smoothing: antialiased; }

.shell { max-width: 1100px; margin: 0 auto; padding: 40px 24px 80px; }

header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 32px; }
.title { font-size: 15px; font-weight: 500; }
.title span { color: var(--accent); }
.title .ver { font-weight: 400; color: var(--muted); margin-left: 6px; }
.status { display: flex; align-items: center; gap: 7px; font-size: 11px; color: var(--muted); }
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border-mid); transition: background .3s; }
.dot.live { background: var(--accent); }

.columns { display: grid; grid-template-columns: 1fr 340px; gap: 32px; align-items: start; }
@media (max-width: 760px) {
  .columns { grid-template-columns: 1fr; }
  .term { height: 220px !important; min-height: unset !important; }
  .term-col { position: static !important; }
}

.section { margin-bottom: 28px; }
.label { font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
.row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
hr { border: none; border-top: 1px solid var(--border); margin: 22px 0; }

select, input[type="text"], input[type="number"] {
  height: 34px; border: 1px solid var(--border); border-radius: 3px; background: var(--white);
  color: var(--text); font-family: var(--mono); font-size: 12px; padding: 0 10px;
  outline: none; transition: border-color .15s; -webkit-appearance: none;
}
select:focus, input:focus { border-color: var(--accent); }
select {
  cursor: pointer; padding-right: 26px;
  background-image: url("data:image/svg+xml,%3Csvg width='9' height='5' viewBox='0 0 9 5' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l3.5 3L8 1' stroke='%23999' stroke-width='1.2' fill='none'/%3E%3C/svg%3E");
  background-repeat: no-repeat; background-position: right 9px center; background-color: var(--white);
}
button {
  height: 34px; padding: 0 14px; border: 1px solid var(--border); border-radius: 3px;
  background: var(--white); color: var(--text); font-family: var(--mono); font-size: 12px;
  cursor: pointer; white-space: nowrap; transition: border-color .15s, background .15s;
}
button:hover { border-color: var(--border-mid); background: var(--bg); }
button:active { transform: scale(0.98); }
button:disabled { opacity: .3; cursor: not-allowed; transform: none; }
button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
button.primary:hover { background: #155732; border-color: #155732; }
button.ghost { background: transparent; border-color: transparent; color: var(--muted); padding: 0 8px; }
button.ghost:hover { color: var(--text); }

.joints { display: flex; flex-direction: column; gap: 14px; }
.joint { display: grid; grid-template-columns: 100px 1fr 80px; gap: 12px; align-items: center; }
.jlabel { display: flex; flex-direction: column; gap: 1px; }
.jname { font-size: 11px; font-weight: 500; color: var(--text); }
.jrange { font-size: 10px; color: var(--muted); }

input[type="range"] {
  -webkit-appearance: none; appearance: none; height: 1px; background: var(--border-mid);
  border: none; padding: 0; outline: none; cursor: pointer; width: 100%;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
  background: var(--white); border: 1.5px solid var(--accent); cursor: pointer; transition: transform .1s;
}
input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.15); }
input[type="range"]::-moz-range-thumb {
  width: 16px; height: 16px; border-radius: 50%; background: var(--white); border: 1.5px solid var(--accent);
}

.jval { display: flex; align-items: center; gap: 4px; justify-content: flex-end; }
.jval input[type="number"] { width: 60px; text-align: right; padding: 0 6px; height: 30px; }
.jdeg { font-size: 11px; color: var(--muted); }

.speed-row { display: grid; grid-template-columns: 1fr 40px; gap: 12px; align-items: center; }
.speed-num { font-size: 12px; text-align: right; }

.saved-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
.saved-item { display: flex; align-items: center; gap: 8px; padding: 10px 12px; background: var(--white); border: 1px solid var(--border); border-radius: 3px; }
.saved-item:hover { border-color: var(--border-mid); }
.saved-name { flex: 1; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.saved-angles { font-size: 11px; color: var(--muted); flex: 2; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.save-row { display: flex; gap: 8px; }
.save-row input[type="text"] { flex: 1; }
.empty { font-size: 12px; color: var(--muted); padding: 4px 0; }

.term-col { position: sticky; top: 24px; display: flex; flex-direction: column; gap: 8px; }
.term-header { display: flex; align-items: center; justify-content: space-between; }
.term {
  background: var(--white); border: 1px solid var(--border); border-radius: 3px;
  padding: 10px 12px; height: calc(100vh - 160px); min-height: 400px;
  overflow-y: auto; display: flex; flex-direction: column; gap: 1px;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}
.term-line { display: flex; gap: 10px; font-size: 11px; line-height: 1.8; }
.term-time { color: var(--muted); flex-shrink: 0; }
.tx   .term-text { color: var(--accent); }
.rx   .term-text { color: var(--text); }
.err  .term-text { color: var(--danger); }
.info .term-text { color: #1a6b3c; font-style: italic; }
.sys  .term-text { color: var(--muted); }
</style>
</head>
<body>
<div class="shell">

  <header>
    <div class="title">myPalletizer <span>260</span><span class="ver">v1.14</span></div>
    <div class="status"><div class="dot" id="dot"></div><span id="connLabel">disconnected</span></div>
  </header>

  <div class="columns">

    <div>

      <div class="section">
        <div class="label">Connection</div>
        <div class="row">
          <select id="baudSelect">
            <option value="115200" selected>115200 baud (M5)</option>
            <option value="1000000">1000000 baud (Pi)</option>
          </select>
          <button class="primary" id="connectBtn" onclick="doConnect()">Connect</button>
          <button id="disconnectBtn" onclick="doDisconnect()" disabled>Disconnect</button>
          <button onclick="doPing()">Ping</button>
          <button onclick="doPowerStatus()">Power status</button>
        </div>
      </div>

      <hr>

      <div class="section">
        <div class="label">Joints</div>
        <div class="joints" id="jointGrid"></div>
        <div style="margin-top:18px">
          <div class="label" style="margin-bottom:10px">Speed</div>
          <div class="speed-row">
            <input type="range" id="speedSlider" min="1" max="100" value="30"
              oninput="document.getElementById('speedNum').textContent=this.value">
            <div class="speed-num" id="speedNum">30</div>
          </div>
        </div>
        <div class="row" style="margin-top:18px">
          <button class="primary" onclick="doSendAngles()">Send</button>
          <button onclick="doHome()">Home</button>
          <button onclick="doGetAngles()">Read angles</button>
          <button onclick="doPowerOn()">Motors on</button>
          <button onclick="doPowerOff()">Power off</button>
          <button onclick="doRelease()">Release</button>
        </div>
      </div>

      <hr>

      <div class="section">
        <div class="label">Saved locations</div>
        <div class="saved-list" id="savedList"></div>
        <div class="save-row">
          <input type="text" id="saveName" placeholder="location name" onkeydown="if(event.key==='Enter')doSave()">
          <button onclick="doSave()">Save current</button>
        </div>
      </div>

    </div>

    <div class="term-col">
      <div class="term-header">
        <span class="label" style="margin-bottom:0">Terminal</span>
        <button class="ghost" onclick="clearLog()">Clear</button>
      </div>
      <div class="term" id="terminal"></div>
    </div>

  </div>
</div>

<script>
// ─────────────────────────────────────────
// Joint definitions
// NOTE: these are user-defined soft limits
// They may need adjustment for the actual arm/tooling
// ─────────────────────────────────────────
var JOINTS = [
  { name: 'J1', min: -150, max:  50, home: -38.9 },
  { name: 'J2', min:  -90, max:  90, home: -57.6 },
  { name: 'J3', min:  -90, max:  90, home:  53.3 },
  { name: 'J4', min: -120, max:  55, home: -35.3 },
];

// ─────────────────────────────────────────
// Protocol
// ─────────────────────────────────────────
var HDR = 0xFE, END = 0xFA;
var CMD = {
  POWER_ON:     0x10,
  POWER_OFF:    0x11,
  IS_POWER_ON:  0x12,
  RELEASE_ALL:  0x13,
  IS_CTRL_CONN: 0x14,
  GET_ANGLES:   0x20,
  SEND_ANGLES:  0x22
};

function buildFrame(cmd, data) {
  data = data || [];
  return new Uint8Array([HDR, HDR, data.length + 2, cmd].concat(data).concat([END]));
}

function degToBytes(deg) {
  var v = Math.round(parseFloat(deg) * 100);
  v = Math.max(-32768, Math.min(32767, v));
  if (v < 0) v += 65536;
  return [(v >> 8) & 0xFF, v & 0xFF];
}

function bytesToDeg(hi, lo) {
  var v = (hi << 8) | lo;
  if (v > 32767) v -= 65536;
  return (v / 100).toFixed(1);
}

function buildSendAngles(angles, speed) {
  var data = [];
  angles.forEach(function(a) {
    var b = degToBytes(a);
    data.push(b[0], b[1]);
  });
  data.push(Math.max(1, Math.min(100, Math.round(Number(speed)))));
  return buildFrame(CMD.SEND_ANGLES, data);
}

function frameToHex(bytes) {
  return Array.from(bytes).map(function(b) {
    return b.toString(16).padStart(2, '0').toUpperCase();
  }).join(' ');
}

// ─────────────────────────────────────────
// Serial
// ─────────────────────────────────────────
var port = null, writer = null, reader = null, rxBuf = new Uint8Array(0);

async function doConnect() {
  if (!navigator.serial) {
    log('Web Serial not supported. Use Chrome/Edge 89+.', 'err');
    return;
  }

  try {
    port = await navigator.serial.requestPort();
    var baud = parseInt(document.getElementById('baudSelect').value, 10);
    await port.open({ baudRate: baud });
    writer = port.writable.getWriter();
    reader = port.readable.getReader();
    rxBuf = new Uint8Array(0);
    setConn(true);
    log('connected at ' + baud + ' baud', 'sys');
    readLoop();
  } catch (e) {
    if (e.name !== 'NotFoundError') log('connect: ' + e.message, 'err');
  }
}

async function doDisconnect() {
  try {
    if (reader) {
      await reader.cancel();
      reader.releaseLock();
      reader = null;
    }
    if (writer) {
      writer.releaseLock();
      writer = null;
    }
    if (port) {
      await port.close();
      port = null;
    }
  } catch (e) {
    log('disconnect: ' + e.message, 'err');
  }

  rxBuf = new Uint8Array(0);
  setConn(false);
  log('disconnected', 'sys');
}

async function readLoop() {
  while (reader) {
    try {
      var result = await reader.read();
      if (result.done) break;

      var merged = new Uint8Array(rxBuf.length + result.value.length);
      merged.set(rxBuf);
      merged.set(result.value, rxBuf.length);
      rxBuf = merged;

      drainBuf();
    } catch (e) {
      if (reader) log('read: ' + e.message, 'err');
      break;
    }
  }
}

function drainBuf() {
  while (rxBuf.length >= 4) {
    if (rxBuf[0] !== HDR || rxBuf[1] !== HDR) {
      rxBuf = rxBuf.slice(1);
      continue;
    }

    var len = rxBuf[2];
    var frameLen = 3 + len;

    if (rxBuf.length < frameLen) break;

    var frame = rxBuf.slice(0, frameLen);

    if (frame[frame.length - 1] !== END) {
      log('bad frame end, resyncing: ' + frameToHex(frame), 'err');
      rxBuf = rxBuf.slice(1);
      continue;
    }

    rxBuf = rxBuf.slice(frameLen);
    onFrame(frame);
  }
}

function onFrame(frame) {
  var cmd  = frame[3];
  var data = Array.from(frame.slice(4, frame.length - 1));
  log('rx  ' + frameToHex(frame), 'rx');

  if (cmd === CMD.IS_CTRL_CONN) {
    log('→ robot connection: ' + (data[0] === 1 ? 'ok' : 'not ok'), 'info');
    return;
  }

  if (cmd === CMD.IS_POWER_ON) {
    log('→ power status: ' + (data[0] === 1 ? 'on' : 'off'), 'info');
    return;
  }

  if (cmd === CMD.GET_ANGLES) {
    if (data.length < 8) {
      log('→ angles response too short: ' + data.length + ' bytes', 'err');
      return;
    }

    var angles = [];
    for (var i = 0; i < 4; i++) {
      angles.push(bytesToDeg(data[i * 2], data[i * 2 + 1]));
    }

    log('→ angles: J1=' + angles[0] + '° J2=' + angles[1] + '° J3=' + angles[2] + '° J4=' + angles[3] + '°', 'info');

    angles.forEach(function(a, i) {
      var val = parseFloat(a);
      var clamped = Math.max(JOINTS[i].min, Math.min(JOINTS[i].max, val));
      document.getElementById('js' + i).value = clamped;
      document.getElementById('jn' + i).value = val.toFixed(1);
    });
    return;
  }

  log('→ unhandled response cmd 0x' + cmd.toString(16).toUpperCase(), 'sys');
}

async function sendFrame(bytes) {
  if (!writer) {
    log('not connected', 'err');
    return false;
  }

  try {
    log('tx  ' + frameToHex(bytes), 'tx');
    await writer.write(bytes);
    return true;
  } catch (e) {
    log('send: ' + e.message, 'err');
    return false;
  }
}

// ─────────────────────────────────────────
// Commands
// ─────────────────────────────────────────
function doPing() {
  sendFrame(buildFrame(CMD.IS_CTRL_CONN));
}

function doPowerStatus() {
  sendFrame(buildFrame(CMD.IS_POWER_ON));
}

function doGetAngles() {
  sendFrame(buildFrame(CMD.GET_ANGLES));
}

function doPowerOn() {
  if (sendFrame(buildFrame(CMD.POWER_ON))) {
    log('power on sent', 'sys');
  }
}

function doPowerOff() {
  if (sendFrame(buildFrame(CMD.POWER_OFF))) {
    log('power off sent', 'sys');
  }
}

function doRelease() {
  if (sendFrame(buildFrame(CMD.RELEASE_ALL))) {
    log('release sent', 'sys');
  }
}

function doSendAngles() {
  var spd = parseInt(document.getElementById('speedSlider').value, 10);
  var angles = JOINTS.map(function(_, i) {
    return parseFloat(document.getElementById('jn' + i).value);
  });

  log('sending: J1=' + angles[0] + '° J2=' + angles[1] + '° J3=' + angles[2] + '° J4=' + angles[3] + '° @ ' + spd, 'sys');
  sendFrame(buildSendAngles(angles, spd));
}

function doHome() {
  var homeAngles = JOINTS.map(function(j) { return j.home; });

  JOINTS.forEach(function(j, i) {
    var v = Math.max(j.min, Math.min(j.max, j.home));
    document.getElementById('js' + i).value = v;
    document.getElementById('jn' + i).value = v.toFixed(1);
  });

  log('homing: J1=' + homeAngles[0] + '° J2=' + homeAngles[1] + '° J3=' + homeAngles[2] + '° J4=' + homeAngles[3] + '°', 'sys');
  sendFrame(buildSendAngles(homeAngles, 30));
}

// ─────────────────────────────────────────
// Joint UI
// ─────────────────────────────────────────
(function() {
  var grid = document.getElementById('jointGrid');

  JOINTS.forEach(function(j, i) {
    var row = document.createElement('div');
    row.className = 'joint';

    var label = document.createElement('div');
    label.className = 'jlabel';
    label.innerHTML = '<span class="jname">' + j.name + '</span><span class="jrange">' + j.min + '° to ' + j.max + '°</span>';

    var slider = document.createElement('input');
    slider.type = 'range';
    slider.id = 'js' + i;
    slider.min = j.min;
    slider.max = j.max;
    slider.value = Math.max(j.min, Math.min(j.max, j.home));
    slider.step = '0.5';

    var valWrap = document.createElement('div');
    valWrap.className = 'jval';

    var numInput = document.createElement('input');
    numInput.type = 'number';
    numInput.id = 'jn' + i;
    numInput.min = j.min;
    numInput.max = j.max;
    numInput.value = j.home.toFixed(1);
    numInput.step = '0.5';

    var degSpan = document.createElement('span');
    degSpan.className = 'jdeg';
    degSpan.textContent = '°';

    valWrap.appendChild(numInput);
    valWrap.appendChild(degSpan);

    row.appendChild(label);
    row.appendChild(slider);
    row.appendChild(valWrap);
    grid.appendChild(row);

    (function(idx, sl, nm) {
      sl.addEventListener('input', function() {
        nm.value = parseFloat(sl.value).toFixed(1);
      });

      nm.addEventListener('input', function() {
        var raw = parseFloat(nm.value);
        if (isNaN(raw)) return;
        var clamped = Math.max(JOINTS[idx].min, Math.min(JOINTS[idx].max, raw));
        sl.value = clamped;
        nm.value = clamped.toFixed(1);
      });
    })(i, slider, numInput);
  });
})();

// ─────────────────────────────────────────
// Saved Locations
// ─────────────────────────────────────────
var STORE_KEY = 'mp260_v14';
var saved = [];

try {
  saved = JSON.parse(localStorage.getItem(STORE_KEY) || '[]');
} catch (_) {
  saved = [];
}

function persist() {
  localStorage.setItem(STORE_KEY, JSON.stringify(saved));
}

function renderSaved() {
  var list = document.getElementById('savedList');
  list.innerHTML = '';

  if (!saved.length) {
    list.innerHTML = '<div class="empty">No saved locations yet.</div>';
    return;
  }

  saved.forEach(function(loc, i) {
    var item = document.createElement('div');
    item.className = 'saved-item';

    var nameSpan = document.createElement('span');
    nameSpan.className = 'saved-name';
    nameSpan.textContent = loc.name;

    var angSpan = document.createElement('span');
    angSpan.className = 'saved-angles';
    angSpan.textContent = loc.angles.map(function(a, j) {
      return JOINTS[j].name + '=' + parseFloat(a).toFixed(1) + '°';
    }).join('  ');

    var goBtn = document.createElement('button');
    goBtn.textContent = 'Go';
    goBtn.setAttribute('data-idx', i);
    goBtn.addEventListener('click', function() {
      recallLocation(parseInt(this.getAttribute('data-idx'), 10));
    });

    var delBtn = document.createElement('button');
    delBtn.className = 'ghost';
    delBtn.textContent = '✕';
    delBtn.title = 'Delete';
    delBtn.setAttribute('data-idx', i);
    delBtn.addEventListener('click', function() {
      deleteLocation(parseInt(this.getAttribute('data-idx'), 10));
    });

    item.appendChild(nameSpan);
    item.appendChild(angSpan);
    item.appendChild(goBtn);
    item.appendChild(delBtn);
    list.appendChild(item);
  });
}

function doSave() {
  var nameEl = document.getElementById('saveName');
  var name = nameEl.value.trim() || ('location ' + (saved.length + 1));
  var angles = JOINTS.map(function(_, i) {
    return parseFloat(document.getElementById('jn' + i).value) || 0;
  });
  var speed = parseInt(document.getElementById('speedSlider').value, 10);

  saved.push({ name: name, angles: angles, speed: speed });
  persist();
  nameEl.value = '';
  renderSaved();
  log('saved "' + name + '"', 'sys');
}

function recallLocation(i) {
  var loc = saved[i];
  if (!loc) {
    log('location not found', 'err');
    return;
  }

  JOINTS.forEach(function(j, k) {
    var v = Math.max(j.min, Math.min(j.max, loc.angles[k]));
    document.getElementById('js' + k).value = v;
    document.getElementById('jn' + k).value = parseFloat(v).toFixed(1);
  });

  document.getElementById('speedSlider').value = loc.speed;
  document.getElementById('speedNum').textContent = loc.speed;

  log('recalling "' + loc.name + '"', 'sys');
  sendFrame(buildSendAngles(loc.angles, loc.speed));
}

function deleteLocation(i) {
  var name = saved[i] ? saved[i].name : '?';
  saved.splice(i, 1);
  persist();
  renderSaved();
  log('deleted "' + name + '"', 'sys');
}

renderSaved();

// ─────────────────────────────────────────
// UI helpers
// ─────────────────────────────────────────
function setConn(c) {
  document.getElementById('dot').className = 'dot' + (c ? ' live' : '');
  document.getElementById('connLabel').textContent = c ? 'connected' : 'disconnected';
  document.getElementById('connectBtn').disabled = c;
  document.getElementById('disconnectBtn').disabled = !c;
}

function log(msg, type) {
  type = type || 'sys';
  var term = document.getElementById('terminal');
  var line = document.createElement('div');
  line.className = 'term-line ' + type;

  var tSpan = document.createElement('span');
  tSpan.className = 'term-time';
  tSpan.textContent = new Date().toTimeString().slice(0, 8);

  var mSpan = document.createElement('span');
  mSpan.className = 'term-text';
  mSpan.textContent = msg;

  line.appendChild(tSpan);
  line.appendChild(mSpan);
  term.appendChild(line);
  term.scrollTop = term.scrollHeight;
}

function clearLog() {
  document.getElementById('terminal').innerHTML = '';
}
</script>
</body>
</html>
